<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Filament Pro Finder</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/2972/2972178.png" type="image/png">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2972/2972178.png">
    <meta name="theme-color" content="#2563eb">

    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; padding: 15px; margin: 0; }
        .card { background: #1e293b; border-radius: 12px; padding: 15px; margin-bottom: 12px; border: 1px solid #334155; }
        .match-exact { border-left: 5px solid #10b981; background: #142d24; }
        .match-close { border-left: 5px solid #f59e0b; background: #2d2614; }
        
        input, select { width: 100%; padding: 12px; margin: 5px 0; border-radius: 8px; border: 1px solid #475569; background: #0f172a; color: white; font-size: 16px; box-sizing: border-box; }
        
        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 16px; }
        .btn-blue { background: #2563eb; color: white; }
        .btn-green { background: #10b981; color: white; }
        .btn-red { background: #ef4444; color: white; padding: 8px; margin-top: 5px; }
        .btn-gray { background: #475569; color: white; margin-top: 5px; }
        
        .hidden { display: none; }
        .flex-between { display: flex; justify-content: space-between; align-items: center; }
        .tag { padding: 4px 8px; border-radius: 6px; font-size: 12px; font-weight: bold; }
        .tag-exact { background: #10b981; }
        .tag-close { background: #f59e0b; }
        
        h2 { margin-top: 0; color: #60a5fa; }
        .stats { font-size: 14px; color: #94a3b8; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div class="card">
        <h2 id="label">Neue Rolle hinzufügen</h2>
        <input type="hidden" id="editIdx">
        <input type="text" id="brand" placeholder="Marke (z.B. Eryone)">
        <input type="text" id="color" placeholder="Farbe (z.B. Blau)">
        <input type="number" id="price" placeholder="Preis in €" step="0.01">
        <input type="number" id="weight" placeholder="Gewicht in g">
        <button id="saveBtn" class="btn btn-blue" onclick="save()">Speichern</button>
        <button id="cancelBtn" class="btn btn-gray hidden" onclick="resetForm()">Abbrechen</button>
    </div>

    <div class="card">
        <h2>Suche / Rechner</h2>
        <input type="number" id="searchWeight" placeholder="Benötigtes Gewicht (g)" oninput="render()">
        <div id="stats" class="stats">0 Rollen im Bestand</div>
    </div>

    <div id="list"></div>

    <div class="card">
        <button class="btn btn-gray" onclick="exportData()">Backup exportieren (JSON)</button>
        <input type="file" id="importFile" class="hidden" onchange="importData(event)">
        <button class="btn btn-gray" onclick="document.getElementById('importFile').click()">Backup importieren</button>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('filamentDB')) || [];

        function save() {
            const idx = document.getElementById('editIdx').value;
            const data = {
                brand: document.getElementById('brand').value,
                color: document.getElementById('color').value,
                price: parseFloat(document.getElementById('price').value),
                weight: parseInt(document.getElementById('weight').value)
            };

            if(!data.brand || isNaN(data.weight)) return alert("Bitte Marke und Gewicht ausfüllen!");

            if(idx === "") {
                db.push(data);
            } else {
                db[idx] = data;
            }

            localStorage.setItem('filamentDB', JSON.stringify(db));
            resetForm();
            render();
        }

        function render() {
            const list = document.getElementById('list');
            const searchVal = parseInt(document.getElementById('searchWeight').value) || 0;
            list.innerHTML = "";
            
            document.getElementById('stats').innerText = `${db.length} Rollen im Bestand`;

            db.forEach((item, i) => {
                const pricePerG = item.price / item.weight;
                const matchClass = searchVal > 0 && item.weight >= searchVal ? 'match-exact' : (searchVal > 0 && item.weight >= searchVal * 0.8 ? 'match-close' : '');
                const tag = searchVal > 0 && item.weight >= searchVal ? '<span class="tag tag-exact">REICHT</span>' : (searchVal > 0 && item.weight >= searchVal * 0.8 ? '<span class="tag tag-close">KNAPP</span>' : '');

                list.innerHTML += `
                    <div class="card ${matchClass}">
                        <div class="flex-between">
                            <strong>${item.brand} - ${item.color}</strong>
                            ${tag}
                        </div>
                        <p>${item.weight}g vorhanden (${(pricePerG * 1000).toFixed(2)}€/kg)</p>
                        <button class="btn btn-blue" style="width:48%; padding: 8px;" onclick="edit(${i})">Edit</button>
                        <button class="btn btn-red" style="width:48%;" onclick="del(${i})">Löschen</button>
                    </div>
                `;
            });
        }

        function edit(i) {
            const item = db[i];
            document.getElementById('editIdx').value = i;
            document.getElementById('brand').value = item.brand;
            document.getElementById('color').value = item.color;
            document.getElementById('price').value = item.price;
            document.getElementById('weight').value = item.weight;
            document.getElementById('label').innerText = "Rolle bearbeiten";
            document.getElementById('saveBtn').className = "btn btn-green";
            document.getElementById('cancelBtn').classList.remove('hidden');
            window.scrollTo(0,0);
        }

        function resetForm() {
            document.getElementById('editIdx').value = "";
            document.getElementById('brand').value = "";
            document.getElementById('color').value = "";
            document.getElementById('price').value = "";
            document.getElementById('weight').value = "";
            document.getElementById('label').innerText = "Neue Rolle hinzufügen";
            document.getElementById('saveBtn').className = "btn btn-blue";
            document.getElementById('cancelBtn').classList.add('hidden');
        }

        function del(i) { if(confirm("Löschen?")) { db.splice(i,1); localStorage.setItem('filamentDB', JSON.stringify(db)); render(); } }
        
        function exportData() {
            const blob = new Blob([JSON.stringify(db)], {type: 'application/json'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'filament_pro_backup.json';
            a.click();
        }

        function importData(event) {
            const reader = new FileReader();
            reader.onload = (e) => { 
                db = JSON.parse(e.target.result); 
                localStorage.setItem('filamentDB', JSON.stringify(db));
                render(); 
            };
            reader.readAsText(event.target.files[0]);
        }

        // PWA Service Worker Registration
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(err => console.log(err));
        }

        render();
    </script>
</body>
</html>
